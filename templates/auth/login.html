{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="login-page">
    <div class="login-bg">
        <div class="login-bg-shape shape-1"></div>
        <div class="login-bg-shape shape-2"></div>
        <div class="login-bg-shape shape-3"></div>
    </div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-card-header">
                <div class="login-logo">
                    <div class="logo-icon-wrap">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                </div>
                <h1 class="login-title">EduTrack Pro</h1>
                <p class="login-subtitle">Student Management System</p>
            </div>
            <div class="login-card-body">
                <h2 class="form-heading">Welcome Back!</h2>
                <p class="form-subheading">Sign in to your account to continue</p>

                <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="form-group-custom mb-4">
                        <label for="username" class="form-label-custom">Username or Email</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-control form-control-custom" id="username"
                                   name="username" placeholder="Enter username or email"
                                   required autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group-custom mb-4">
                        <label for="password" class="form-label-custom">Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-control form-control-custom" id="password"
                                   name="password" placeholder="Enter your password"
                                   required autocomplete="current-password">
                            <button type="button" class="password-toggle" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-login w-100" id="loginBtn">
                        <span class="btn-text">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </span>
                        <span class="btn-spinner d-none">
                            <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
                        </span>
                    </button>
                </form>

            </div>
        </div>

        <div class="login-features">
            <div class="feature-item">
                <i class="fas fa-shield-alt feature-icon"></i>
                <span>Secure Authentication</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-chart-line feature-icon"></i>
                <span>Real-time Analytics</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-robot feature-icon"></i>
                <span>AI-Powered Insights</span>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
});

document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    btn.querySelector('.btn-text').classList.add('d-none');
    btn.querySelector('.btn-spinner').classList.remove('d-none');
    btn.disabled = true;
});
</script>
{% endblock %}
