services:
  - type: web
    name: edutrack-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: WTF_CSRF_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edutrack-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        value: dnxkhezeh
      - key: CLOUDINARY_API_KEY
        value: "344713289558367"
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: edutrack-db
    plan: free
